spring:
  application:
    name: ms-notificaciones
  config:
    import: optional:configserver:http://config-server:8888
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: change-me-rabbitmq
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@clinica.com}
    password: ${MAIL_PASSWORD:change-me-mail}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

notificaciones:
  remitente: ${MAIL_USERNAME:noreply@clinica.com}

server:
  port: 8090

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false  # SMTP no debe bloquear el health del servicio
