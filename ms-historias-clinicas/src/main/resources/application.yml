spring:
  application:
    name: ms-historias-clinicas
  config:
    import: optional:configserver:http://config-server:8888
  mongodb:
    uri: mongodb://admin:change-me-mongo@mongodb-clinica:27017/db_historias_clinicas?authSource=admin
  rabbitmq:
    host: rabbitmq-clinica
    port: 5672
    username: admin
    password: change-me-rabbitmq

server:
  port: 8086

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
