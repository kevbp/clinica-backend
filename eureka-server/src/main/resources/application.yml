spring:
  application:
    name: eureka-server
  config:
    import: optional:configserver:http://config-server:8888

# Fallback local para cuando config-server no está disponible
server:
  port: 8761

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
