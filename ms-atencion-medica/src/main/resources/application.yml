spring:
  application:
    name: ms-atencion-medica
  config:
    import: optional:configserver:http://config-server:8888
  data:
    redis:
      host: localhost
      port: 6379
      password: change-me-redis
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: change-me-rabbitmq

server:
  port: 8089

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
