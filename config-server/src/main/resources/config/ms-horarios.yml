server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db_horarios
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:change-me-postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
