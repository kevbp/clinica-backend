server:
  port: 8090

# La configuración SMTP (host, puerto, usuario, password, remitente) ya NO se lee de
# properties estáticas: se administra desde el frontend (Sistema > Configuración) y se
# persiste cifrada en db_notificaciones. Ver ConfiguracionSmtpService.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db_notificaciones
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:change-me-postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

notificaciones:
  # Clave AES-256 (32 bytes, base64) para cifrar el password SMTP en BD.
  # Generar con: openssl rand -base64 32. El valor por defecto es el mismo que infraestructura/.env
  # (los microservicios corren localmente desde el IDE y no leen ese .env, igual que POSTGRES_PASSWORD).
  smtp-config-secret: ${SMTP_CONFIG_SECRET:cAcRUAeukViPLgN1S1m8nxKZAXScUfXPL5Z5GAGIJH8=}

management:
  health:
    mail:
      enabled: false
