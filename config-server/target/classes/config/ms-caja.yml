server:
  port: 8088

spring:
  cloud:
    openfeign:
      httpclient:
        hc5:
          enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/db_caja
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:change-me-postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
