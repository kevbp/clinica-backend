server:
  port: 8089

spring:
  cloud:
    openfeign:
      httpclient:
        hc5:
          enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/db_atencion
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:change-me-postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:change-me-redis}
